server {
  listen 80;
  server_name localhost;

  # Proxy API calls to the backend service — eliminates CORS entirely
  # Also handles WebSocket upgrades (ws://) for proctoring
  location /api/ {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # WebSocket support
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 120s;
    # Rewrite redirects from api:8000 to localhost:3000 (fixes /api/problems 307 → /api/problems/)
    proxy_redirect http://api:8000/ /;
  }

  # Admin panel — served at /admin
  location ^~ /admin {
    alias /usr/share/nginx/admin;
    index index.html;
    # For SPA client-side routing: fall back to admin index.html
    try_files $uri $uri/ @admin_index;
  }

  location @admin_index {
    root /usr/share/nginx;
    try_files /admin/index.html =404;
  }

  # Web frontend — served at /
  location / {
    root   /usr/share/nginx/html;
    index  index.html index.htm;
    try_files $uri $uri/ /index.html;

    # Never cache index.html to ensure clients get the latest SPA bundle on reload
    location = /index.html {
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }
  }
}