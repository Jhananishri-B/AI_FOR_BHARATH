server {
  listen 80;
  server_name localhost;

  # ── Gzip compression (reduces transfer size 60-80%) ───────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

  # ── Proxy API calls to the backend service ────────────────────────────────
  location /api/ {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # WebSocket support
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 120s;
    proxy_redirect http://api:8000/ /;
  }

  # ── Admin panel — served at /admin ────────────────────────────────────────
  location ^~ /admin {
    alias /usr/share/nginx/admin;
    index index.html;
    try_files $uri $uri/ @admin_index;

    # Cache hashed admin assets for 1 year (immutable = never revalidate)
    location ~* ^/admin/assets/.*\.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
      alias /usr/share/nginx/admin;
      try_files $uri =404;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }

  location @admin_index {
    root /usr/share/nginx;
    try_files /admin/index.html =404;
  }

  # ── Web frontend — served at / ───────────────────────────────────────────
  location / {
    root   /usr/share/nginx/html;
    index  index.html index.htm;
    try_files $uri $uri/ /index.html;

    # Never cache index.html to ensure clients get the latest SPA bundle
    location = /index.html {
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }
  }

  # ── Cache hashed static assets for 1 year ─────────────────────────────────
  # Vite outputs files like /assets/Dashboard-abc123.js — hash changes on rebuild
  location ~* ^/assets/.*\.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
    root /usr/share/nginx/html;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}